services:
  traefik:
    container_name: placebrain-traefik
    image: traefik:v3.4
    networks:
      - placebrain-net
    ports:
      - "80:80"
      - "443:443"
      - "1883:1883"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/etc/traefik/acme
    restart: unless-stopped

  postgres:
    container_name: placebrain-database
    build: ./config/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - placebrain-net
    volumes:
      - ../var/postgresql:/var/lib/postgresql/data
      - ./config/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    container_name: placebrain-auth-service
    image: placebrain-auth-service
    networks:
      - placebrain-net
    build:
      context: ../backend/auth
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 50051)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  places:
    container_name: placebrain-places-service
    image: placebrain-places-service
    networks:
      - placebrain-net
    build:
      context: ../backend/places
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 50052)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  kafka:
    container_name: placebrain-kafka
    image: apache/kafka:4.0.0
    networks:
      - placebrain-net
    volumes:
      - ./config/kafka:/mnt/shared/config:ro
      - ../var/kafka:/var/kafka/kafka-logs
    environment:
      CLUSTER_ID: J9gpSxuySPGisjfSj3jCyw
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:19092 | grep -q ApiVersion
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # One-shot job that creates all declared Kafka topics on startup.
  # The broker runs with auto.create.topics.enable=false, so consumers must wait
  # for this container to exit successfully before subscribing — otherwise they
  # spam "unknown topic" warnings and can race the broker on cold start.
  kafka-init:
    container_name: placebrain-kafka-init
    image: apache/kafka:4.0.0
    networks:
      - placebrain-net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic places.member.added --partitions 3 --replication-factor 1 --config cleanup.policy=compact &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic places.member.removed --partitions 3 --replication-factor 1 --config cleanup.policy=compact &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic places.member.role-changed --partitions 3 --replication-factor 1 --config cleanup.policy=compact &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic places.place.deleted --partitions 3 --replication-factor 1 --config cleanup.policy=compact &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic devices.threshold.created --partitions 3 --replication-factor 1 --config cleanup.policy=compact &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic devices.threshold.deleted --partitions 3 --replication-factor 1 --config cleanup.policy=compact &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic devices.device.deleted --partitions 3 --replication-factor 1 --config cleanup.policy=compact &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic devices.device.bulk-deleted --partitions 3 --replication-factor 1 --config cleanup.policy=compact &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic telemetry.readings --partitions 6 --replication-factor 1 --config cleanup.policy=delete --config retention.ms=604800000 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server placebrain-kafka:19092 --create --if-not-exists --topic telemetry.status --partitions 3 --replication-factor 1 --config cleanup.policy=delete --config retention.ms=86400000
    restart: "no"

  redis:
    container_name: placebrain-redis
    image: redis:bookworm
    networks:
      - placebrain-net
    volumes:
      - ../var/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  devices:
    container_name: placebrain-devices-service
    image: placebrain-devices-service
    networks:
      - placebrain-net
    build:
      context: ../backend/devices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 50053)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  collector:
    container_name: placebrain-collector-service
    image: placebrain-collector-service
    networks:
      - placebrain-net
    build:
      context: ../backend/collector
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 50054)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  gateway:
    container_name: placebrain-gateway-service
    image: placebrain-gateway-service
    networks:
      - placebrain-net
    build:
      context: ../backend/gateway
    depends_on:
      auth:
        condition: service_healthy
      places:
        condition: service_healthy
      devices:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8000)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # Public API
      - "traefik.http.routers.api.rule=PathPrefix(`/api/`) && !PathPrefix(`/api/internal/`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      # Swagger docs
      - "traefik.http.routers.docs.rule=PathPrefix(`/docs`) || Path(`/openapi.json`)"
      - "traefik.http.routers.docs.entrypoints=web"
      - "traefik.http.routers.docs.service=api"

  emqx:
    container_name: placebrain-emqx
    image: emqx/emqx-enterprise:5.9
    networks:
      - placebrain-net
    volumes:
      - ./config/emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - emqx-data:/opt/emqx/data
    depends_on:
      gateway:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    labels:
      - "traefik.enable=true"
      # MQTT WebSocket
      - "traefik.http.routers.mqtt-ws.rule=PathPrefix(`/mqtt`)"
      - "traefik.http.routers.mqtt-ws.entrypoints=web"
      - "traefik.http.services.mqtt-ws.loadbalancer.server.port=8083"
      # MQTT TCP
      - "traefik.tcp.routers.mqtt-tcp.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.mqtt-tcp.entrypoints=mqtt"
      - "traefik.tcp.services.mqtt-tcp.loadbalancer.server.port=1883"

  frontend:
    container_name: placebrain-frontend
    image: placebrain-frontend
    build:
      context: ../frontend
    networks:
      - placebrain-net
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  placebrain-net:
    name: placebrain-net
    driver: bridge

volumes:
  emqx-data:
  traefik-certs:
