entryPoints:
  web:
    address: ":80"
  mqtt:
    address: ":1883"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: placebrain-net
  file:
    directory: /etc/traefik/dynamic
    watch: true

api:
  dashboard: true
  insecure: true

log:
  level: DEBUG
