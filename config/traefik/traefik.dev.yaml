global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
  mqtt:
    address: ":1883"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: placebrain-net

api:
  dashboard: true
  insecure: true

log:
  level: DEBUG
