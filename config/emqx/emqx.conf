node {
  name = "emqx@127.0.0.1"
  cookie = "placebrain_emqx_secret_cookie"
  data_dir = "/opt/emqx/data"
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 1024000
}

dashboard {
  listeners.http {
    bind = "0.0.0.0:18083"
  }
}

authorization {
  no_match = deny
  deny_action = disconnect
  cache {
    enable = true
    max_size = 1024
    ttl = 1m
  }

  sources = [
    {
      type = http
      enable = true
      method = post
      url = "http://gateway:8000/api/internal/mqtt/acl"
      headers {
        "content-type" = "application/json"
      }
      body {
        username = "${username}"
        topic = "${topic}"
        action = "${action}"
      }
      ssl {
        enable = false
      }
    }
  ]
}

connectors {
  kafka_producer {
    placebrain_kafka {
      bootstrap_hosts = "placebrain-kafka:19092"
      connect_timeout = "5s"
      metadata_request_timeout = "5s"
      min_metadata_refresh_interval = "3s"
      authentication = "none"
      ssl {
        enable = false
      }
    }
  }
}

actions {
  kafka_producer {
    telemetry_readings {
      connector = placebrain_kafka
      enable = true
      parameters {
        topic = "telemetry.readings"
        message {
          key = "${.topic}"
          value = "{\"topic\": \"${.topic}\", \"payload\": ${.payload}}"
          timestamp = "${.timestamp}"
        }
        partition_strategy = "random"
        required_acks = "all_isr"
      }
      resource_opts {
        health_check_interval = "15s"
      }
    }
    telemetry_status {
      connector = placebrain_kafka
      enable = true
      parameters {
        topic = "telemetry.status"
        message {
          key = "${.topic}"
          value = "{\"topic\": \"${.topic}\", \"payload\": ${.payload}}"
          timestamp = "${.timestamp}"
        }
        partition_strategy = "random"
        required_acks = "all_isr"
      }
      resource_opts {
        health_check_interval = "15s"
      }
    }
  }
}

rule_engine {
  ignore_sys_message = true
  rules {
    telemetry_to_kafka {
      enable = true
      sql = "SELECT topic, payload, timestamp FROM \"placebrain/+/devices/+/telemetry\""
      actions = ["kafka_producer:telemetry_readings"]
    }
    status_to_kafka {
      enable = true
      sql = "SELECT topic, payload, timestamp FROM \"placebrain/+/devices/+/status\""
      actions = ["kafka_producer:telemetry_status"]
    }
  }
}

authentication = [
  {
    mechanism = password_based
    backend = http
    enable = true
    method = post
    url = "http://gateway:8000/api/internal/mqtt/auth"
    headers {
      "content-type" = "application/json"
    }
    body {
      username = "${username}"
      password = "${password}"
    }
    ssl {
      enable = false
    }
  }
]
